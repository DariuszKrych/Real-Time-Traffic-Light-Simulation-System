name: Build release binaries

# Build a Linux AppImage and a Windows .exe on every `v*` tag push, then
# attach them to a GitHub release. Also runnable manually via the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux:
    name: Build Linux AppImage
    # Ubuntu 22.04 has glibc 2.35 — old enough to run on current Debian
    # stable, Fedora, Arch, openSUSE, etc.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OS deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget

      - name: Build AppImage
        run: bash build/build_linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/TrafficSim-x86_64.AppImage
          if-no-files-found: error

  windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build EXE
        shell: cmd
        run: build\build_windows.bat

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/TrafficSim.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release

      - name: Create release & upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/TrafficSim-x86_64.AppImage
            release/TrafficSim.exe
          generate_release_notes: true
